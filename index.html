<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Energy Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--navy:#0c1e2d;--navy-light:#375673;--green:#779d36;--green-light:#8fb844;--bg:#f7f8fa;--text:#0c1e2d;--text-muted:#5a6b7a}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column}

        /* Floating icons - all three entities */
        .floating-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
        .hex{position:absolute;opacity:0.035;animation:drift linear infinite}
        .hex img{width:100%;height:100%}
        @keyframes drift{
            0%{transform:translate(0,0) rotate(0deg)}
            20%{transform:translate(25px,-35px) rotate(6deg)}
            40%{transform:translate(-15px,-70px) rotate(-4deg)}
            60%{transform:translate(35px,-50px) rotate(8deg)}
            80%{transform:translate(-10px,-20px) rotate(-3deg)}
            100%{transform:translate(0,0) rotate(0deg)}
        }

        .page{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;min-height:100vh}

        /* Wordmark logo */
        .logo-area{text-align:center;margin-bottom:48px}
        .logo-area img.wordmark{height:52px;object-fit:contain;margin-bottom:12px}
        .logo-area .sub{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:400;letter-spacing:6px;text-transform:uppercase;color:var(--text-muted)}
        .accent-line{width:50px;height:2px;background:linear-gradient(90deg,var(--green),var(--green-light));margin:20px auto 0;border-radius:1px}

        /* Nav links */
        .nav-links{display:flex;flex-direction:column;align-items:center;gap:0}
        .nav-link{display:block;text-decoration:none;color:var(--navy-light);font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:18px 36px;transition:all 0.4s ease;position:relative}
        .nav-link::after{content:'';position:absolute;bottom:10px;left:50%;transform:translateX(-50%) scaleX(0);width:30px;height:2px;background:var(--green);transition:transform 0.3s ease;border-radius:1px}
        .nav-link:hover{color:var(--navy);letter-spacing:5px}
        .nav-link:hover::after{transform:translateX(-50%) scaleX(1)}
        .nav-link .lock{font-size:10px;opacity:0.35;margin-left:6px;vertical-align:middle}

        .nav-dot{width:3px;height:3px;border-radius:50%;background:rgba(55,86,115,0.15)}

        /* Footer */
        .footer{position:relative;z-index:1;text-align:center;padding:24px;font-size:10px;color:var(--text-muted);opacity:0.5}
        .footer a{color:var(--navy-light);text-decoration:none;transition:opacity 0.3s}
        .footer a:hover{opacity:0.8}
        .footer .domains{display:flex;justify-content:center;gap:16px;margin-top:6px}

        @media(max-width:640px){
            .logo-area img.wordmark{height:36px}
            .logo-area .sub{font-size:12px;letter-spacing:4px}
            .nav-link{font-size:14px;letter-spacing:2px;padding:14px 24px}
        }
    </style>
</head>
<body>

<div class="floating-bg">
    <!-- DEG icons -->
    <div class="hex" style="width:160px;top:6%;left:3%;animation-duration:55s"><img src="deg-icon.png"></div>
    <div class="hex" style="width:100px;top:45%;right:4%;animation-duration:48s;animation-delay:-20s"><img src="deg-icon.png"></div>
    <div class="hex" style="width:80px;top:82%;left:25%;animation-duration:52s;animation-delay:-35s"><img src="deg-icon.png"></div>
    <!-- DEI icons -->
    <div class="hex" style="width:140px;top:18%;right:10%;animation-duration:50s;animation-delay:-10s"><img src="dei-icon.png"></div>
    <div class="hex" style="width:90px;top:65%;left:8%;animation-duration:46s;animation-delay:-28s"><img src="dei-icon.png"></div>
    <div class="hex" style="width:120px;top:35%;left:70%;animation-duration:58s;animation-delay:-42s"><img src="dei-icon.png"></div>
    <!-- DER icons -->
    <div class="hex" style="width:130px;top:10%;left:45%;animation-duration:53s;animation-delay:-15s"><img src="der-icon.png"></div>
    <div class="hex" style="width:70px;top:55%;left:30%;animation-duration:44s;animation-delay:-8s"><img src="der-icon.png"></div>
    <div class="hex" style="width:110px;top:75%;right:15%;animation-duration:56s;animation-delay:-32s"><img src="der-icon.png"></div>
</div>

<div class="page">
    <div class="logo-area">
        <img src="dei-wordmark.png" alt="Distributed" class="wordmark">
        <div class="sub">Energy Group</div>
        <div class="accent-line"></div>
    </div>

    <nav class="nav-links">
        <a href="client.html" class="nav-link">Owners</a>
        <div class="nav-dot"></div>
        <a href="form.html" class="nav-link">Vendors &amp; Subcontractors</a>
        <div class="nav-dot"></div>
        <a href="dashboard.html" class="nav-link">Employees <span class="lock">🔒</span></a>
    </nav>
</div>

<div class="footer">
    <div>© 2026 Distributed Energy Group · Stuart, Florida</div>
    <div class="domains">
        <a href="https://www.distributedei.com">DEI</a>
        <a href="https://www.distributeder.com">DER</a>
        <a href="https://www.distributedeg.com">DEG</a>
    </div>
</div>

</body>
</html>
