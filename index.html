<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Energy Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0c1e2d;color:#fff;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column}

        /* Ambient glow */
        body::before{content:'';position:fixed;top:-20%;left:-10%;width:60%;height:60%;background:radial-gradient(circle,rgba(55,86,115,0.12) 0%,transparent 70%);z-index:0;pointer-events:none}
        body::after{content:'';position:fixed;bottom:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(circle,rgba(119,157,54,0.06) 0%,transparent 70%);z-index:0;pointer-events:none}

        /* Floating hexagons */
        .floating-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
        .hex{position:absolute;opacity:0.02;animation:drift linear infinite}
        .hex img{width:100%;height:100%}
        @keyframes drift{
            0%{transform:translate(0,0) rotate(0deg)}
            20%{transform:translate(25px,-35px) rotate(6deg)}
            40%{transform:translate(-15px,-70px) rotate(-4deg)}
            60%{transform:translate(35px,-50px) rotate(8deg)}
            80%{transform:translate(-10px,-20px) rotate(-3deg)}
            100%{transform:translate(0,0) rotate(0deg)}
        }

        /* Main content */
        .page{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;min-height:100vh}

        /* Logo mark */
        .logo-mark{margin-bottom:32px;opacity:0.6}
        .logo-mark img{width:48px;height:48px;object-fit:contain}

        /* Big wordmark */
        .wordmark{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:800;letter-spacing:6px;text-transform:uppercase;color:#fff;text-align:center;line-height:1;margin-bottom:8px}
        .subtitle{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:300;letter-spacing:8px;text-transform:uppercase;color:rgba(255,255,255,0.25);text-align:center;margin-bottom:60px}

        /* Green accent line */
        .accent-line{width:40px;height:2px;background:linear-gradient(90deg,#779d36,#8fb844);margin:0 auto 48px;border-radius:1px}

        /* Navigation links */
        .nav-links{display:flex;flex-direction:column;align-items:center;gap:0}
        .nav-link{display:block;text-decoration:none;color:rgba(255,255,255,0.4);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;letter-spacing:3px;text-transform:uppercase;padding:16px 32px;transition:all 0.4s ease;position:relative}
        .nav-link::after{content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%) scaleX(0);width:30px;height:1px;background:#779d36;transition:transform 0.3s ease}
        .nav-link:hover{color:rgba(255,255,255,0.9);letter-spacing:5px}
        .nav-link:hover::after{transform:translateX(-50%) scaleX(1)}

        .nav-link .lock{font-size:10px;opacity:0.3;margin-left:6px;vertical-align:middle}

        /* Divider dots between links */
        .nav-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.1);margin:4px auto}

        /* Footer */
        .footer{position:relative;z-index:1;text-align:center;padding:24px;color:rgba(255,255,255,0.12);font-size:10px;letter-spacing:0.5px}
        .footer a{color:rgba(255,255,255,0.18);text-decoration:none;transition:color 0.3s}
        .footer a:hover{color:rgba(255,255,255,0.4)}
        .footer .domains{display:flex;justify-content:center;gap:16px;margin-top:6px}

        @media(max-width:640px){
            .wordmark{font-size:42px;letter-spacing:4px}
            .subtitle{font-size:14px;letter-spacing:5px}
            .nav-link{font-size:14px;letter-spacing:2px;padding:14px 24px}
        }
    </style>
</head>
<body>

<div class="floating-bg">
    <div class="hex" style="width:180px;top:5%;left:2%;animation-duration:55s"><img src="deg-icon.png"></div>
    <div class="hex" style="width:100px;top:20%;right:5%;animation-duration:45s;animation-delay:-14s"><img src="deg-icon.png"></div>
    <div class="hex" style="width:220px;top:55%;left:75%;animation-duration:62s;animation-delay:-24s"><img src="deg-icon.png"></div>
    <div class="hex" style="width:80px;top:78%;left:8%;animation-duration:48s;animation-delay:-8s"><img src="deg-icon.png"></div>
    <div class="hex" style="width:130px;top:12%;left:50%;animation-duration:52s;animation-delay:-18s"><img src="deg-icon.png"></div>
    <div class="hex" style="width:90px;top:65%;right:30%;animation-duration:50s;animation-delay:-30s"><img src="deg-icon.png"></div>
    <div class="hex" style="width:160px;top:40%;left:10%;animation-duration:58s;animation-delay:-40s"><img src="deg-icon.png"></div>
    <div class="hex" style="width:70px;top:88%;right:12%;animation-duration:44s;animation-delay:-20s"><img src="deg-icon.png"></div>
</div>

<div class="page">
    <div class="logo-mark"><img src="deg-icon.png" alt="DEG"></div>
    <div class="wordmark">Distributed</div>
    <div class="subtitle">Energy Group</div>
    <div class="accent-line"></div>

    <nav class="nav-links">
        <a href="client.html" class="nav-link">Owners</a>
        <div class="nav-dot"></div>
        <a href="form.html" class="nav-link">Vendors &amp; Subcontractors</a>
        <div class="nav-dot"></div>
        <a href="dashboard.html" class="nav-link">Employees <span class="lock">🔒</span></a>
    </nav>
</div>

<div class="footer">
    <div>© 2026 Distributed Energy Group · 416 SE Balboa Ave, Stuart, FL 34994</div>
    <div class="domains">
        <a href="https://www.distributedei.com">DEI</a>
        <a href="https://www.distributeder.com">DER</a>
        <a href="https://www.distributedeg.com">DEG</a>
    </div>
</div>

</body>
</html>
